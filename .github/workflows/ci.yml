name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # The postinstall binary download is not needed for unit tests / build; integration
  # tests self-skip when no rift binary is present. Keep CI hermetic and offline.
  RIFT_SKIP_BINARY_DOWNLOAD: '1'

jobs:
  test:
    name: test (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docs:
    name: docs (examples + embed check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck examples
        run: npm run typecheck:examples

      - name: Check README/docs embeds match examples/*.ts
        run: npm run docs:check

  embedded-conformance:
    name: embedded conformance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Runs against the BUILT package via jest.embedded.config.js (src imports remapped to dist),
    # so worker_threads resolves the real dist/embedded/worker.js (#44). Still allowed-failure:
    # with the harness fixed, the lane now genuinely exercises the FFI — and librift_ffi/koffi
    # segfaults cross-platform once the full binding runs (#53). Drop this continue-on-error to
    # make the lane the required M8 gate as soon as #53 lands. When the cdylib fetch fails the
    # embedded describes self-skip and the job still proves the conformance gate against dist.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # Workspace-relative so `actions/cache` can key on a plain path on every OS, rather than
      # depending on each platform's own cache-dir default (`~/.cache` / `%LOCALAPPDATA%`) resolving
      # predictably inside the runner.
      RIFT_CACHE_DIR: ${{ github.workspace }}/.rift-cache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Cache librift_ffi cdylib
        uses: actions/cache@v4
        with:
          path: ${{ env.RIFT_CACHE_DIR }}
          key: rift-ffi-${{ matrix.os }}-${{ hashFiles('package.json') }}

      # Best-effort fetch of the published cdylib: on a transient failure (network, a classifier
      # not yet published) `continue-on-error` leaves `RIFT_FFI_LIB` unset and the embedded
      # describes (`describeEmbeddedOrSkip`) self-skip — the job still gates the conformance
      # suite against dist. When the fetch succeeds the embedded replay lane actually runs.
      - name: Fetch librift_ffi cdylib
        id: fetch-lib
        continue-on-error: true
        run: echo "lib_path=$(npx rift-fetch --lib)" >> "$GITHUB_OUTPUT"

      - name: Conformance + embedded integration tests
        run: npm run test:embedded
        env:
          RIFT_FFI_LIB: ${{ steps.fetch-lib.outputs.lib_path }}

  embedded-conformance-windows:
    # Experimental: Windows support for the embedded transport (koffi + the cdylib loader) is
    # unvalidated — this job tracks it without gating merges on it (`continue-on-error: true`), and
    # is named with the `experimental` label so it's obvious at a glance in the checks list.
    name: embedded conformance (windows-latest, experimental)
    runs-on: windows-latest
    continue-on-error: true
    env:
      RIFT_CACHE_DIR: ${{ github.workspace }}/.rift-cache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Cache librift_ffi cdylib
        uses: actions/cache@v4
        with:
          path: ${{ env.RIFT_CACHE_DIR }}
          key: rift-ffi-windows-latest-${{ hashFiles('package.json') }}

      # Same best-effort/self-skip reasoning as the ubuntu/macos job above; `shell: bash` so the
      # `$(...)`/`>>` output-capture syntax is portable to the Windows runner.
      - name: Fetch librift_ffi cdylib
        id: fetch-lib
        continue-on-error: true
        shell: bash
        run: echo "lib_path=$(npx rift-fetch --lib)" >> "$GITHUB_OUTPUT"

      - name: Conformance + embedded integration tests
        shell: bash
        run: npm run test:embedded
        env:
          RIFT_FFI_LIB: ${{ steps.fetch-lib.outputs.lib_path }}

  # ── Debug-only lane for #53 (embedded FFI segfault) ──────────────────────────────────────────
  # NOT a gate and NOT part of normal CI: runs ONLY on a manual `workflow_dispatch` or when a commit
  # message carries the `[ffi-debug]` marker (the `if:` below). It deliberately drives the crashing
  # embedded FFI flow under core-dump capture to turn the bare "Segmentation fault" line into an
  # actual native backtrace. Two modes per OS:
  #   asis    — the shipped decode + rift_free discipline.
  #   no-free — every `rift_free` CALL in native-call.ts no-op'd via an in-CI patch (leaks by design):
  #             the H2 ownership experiment. If the segfault DISAPPEARS with frees disabled, the crash
  #             is a free of a library-owned char* buffer (native-call.ts:78,128) — a fixable SDK bug.
  # Artifacts (native backtrace, test log, node report, macOS .ips crash report, gzipped core) are
  # uploaded for offline analysis. `continue-on-error` so a crash never fails the workflow — the crash
  # is the point.
  embedded-segfault-debug:
    name: ffi segfault debug (${{ matrix.os }} · ${{ matrix.mode }})
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[ffi-debug]')
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # asis      — shipped decode + rift_free discipline.
        # no-free   — rift_free calls no-op'd (H2: is the crash a free?). Refuted: still segfaults.
        # no-decode — RIFT_FFI_DEBUG_NO_DECODE skips koffi.decode(char*,'string') (which runs strlen
        #             on the result pointer). If the strlen crash DISAPPEARS -> it's the result-decode
        #             path; if it PERSISTS -> it's argument marshalling. Per-symbol trace (all modes)
        #             names the crashing symbol via RIFT_FFI_DEBUG_TRACE.
        mode: [asis, no-free, no-decode]
    env:
      RIFT_CACHE_DIR: ${{ github.workspace }}/.rift-cache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      # H2 diagnostic: no-op every rift_free CALL in native-call.ts before building. `void (ptr)` still
      # evaluates the argument but never frees. Only ever runs in this debug lane's no-free mode.
      - name: Patch out rift_free (no-free mode only)
        if: matrix.mode == 'no-free'
        run: |
          perl -pi -e 's/binding\.rift_free\(/void (/g' src/embedded/native-call.ts
          echo "----- patched native-call.ts rift_free call sites -----"
          grep -n "rift_free\|void (" src/embedded/native-call.ts || true

      - name: Build
        run: npm run build

      - name: Cache librift_ffi cdylib
        uses: actions/cache@v4
        with:
          path: ${{ env.RIFT_CACHE_DIR }}
          key: rift-ffi-${{ matrix.os }}-${{ hashFiles('package.json') }}

      # Fetch is REQUIRED here (unlike the conformance lane): a debug run that self-skips the FFI is
      # pointless, so a failed fetch should fail loudly rather than silently skip.
      - name: Fetch librift_ffi cdylib
        id: fetch-lib
        run: |
          lib="$(npx rift-fetch --lib)"
          echo "lib_path=$lib" >> "$GITHUB_OUTPUT"
          test -f "$lib" || { echo "::error::cdylib fetch produced no file ($lib)"; exit 1; }

      - name: Enable core dumps + install gdb (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y gdb
          mkdir -p "$GITHUB_WORKSPACE/cores"
          chmod 1777 "$GITHUB_WORKSPACE/cores"
          echo "$GITHUB_WORKSPACE/cores/core.%e.%p" | sudo tee /proc/sys/kernel/core_pattern
          echo 1 | sudo tee /proc/sys/fs/suid_dumpable

      - name: Enable core dumps (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo sysctl -w kern.coredump=1 || true
          sudo mkdir -p /cores
          sudo chmod 1777 /cores

      - name: Run embedded suite under core-dump capture
        id: repro
        shell: bash
        env:
          RIFT_FFI_LIB: ${{ steps.fetch-lib.outputs.lib_path }}
          NODE_OPTIONS: --report-on-fatalerror --report-directory=${{ github.workspace }}/node-reports
          # Per-symbol trace (all modes): the worker appends each native symbol name synchronously
          # before the call, so the file's last line names the crashing symbol.
          RIFT_FFI_DEBUG_TRACE: ${{ github.workspace }}/ffi-trace.log
          # no-decode mode only: skip koffi.decode. Empty string (other modes) is falsy -> inert.
          RIFT_FFI_DEBUG_NO_DECODE: ${{ matrix.mode == 'no-decode' && '1' || '' }}
        run: |
          ulimit -c unlimited
          mkdir -p "$GITHUB_WORKSPACE/node-reports"
          rm -f "$GITHUB_WORKSPACE/ffi-trace.log"
          set +e
          npm run test:embedded 2>&1 | tee test-output.log
          code=${PIPESTATUS[0]}
          set -e
          echo "test:embedded exit code = $code (139 = SIGSEGV, 134 = SIGABRT)"
          echo "----- last native steps traced before exit (culprit = last line) -----"
          echo "[from stderr trace in test-output.log]"
          grep -a '\[ffi-trace\]' test-output.log | tail -n 20 || echo "(no [ffi-trace] lines in output)"
          echo "[from trace file]"
          tail -n 20 "$GITHUB_WORKSPACE/ffi-trace.log" 2>/dev/null || echo "(no trace file)"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Extract native backtrace (Linux / gdb)
        if: always() && runner.os == 'Linux'
        run: |
          shopt -s nullglob
          cores=( "$GITHUB_WORKSPACE"/cores/core.* )
          core="${cores[0]:-}"
          if [ -n "$core" ]; then
            echo "core: $core"
            # Dump the faulting frame + registers + the memory the crashing instruction touched.
            # For a strlen SIGSEGV the char* being walked is in $rdi (x86_64 SysV) — x/s shows whether
            # it is an unmapped/garbage pointer or a valid-but-unterminated buffer.
            gdb -batch -q \
              -ex "bt" \
              -ex "info registers rip rdi rsi rdx" \
              -ex "x/2i \$rip" \
              -ex "printf \"--- string at \$rdi: ---\n\"" \
              -ex "x/s \$rdi" \
              -ex "x/64bx \$rdi" \
              -ex "bt full" \
              -ex "thread apply all bt" \
              -ex "info sharedlibrary" \
              -ex "quit" \
              "$(command -v node)" "$core" | tee backtrace.txt
            gzip -f "$core" || true
          else
            echo "no core file under cores/ (exit=${{ steps.repro.outputs.exit_code }}); no crash or core disabled" | tee backtrace.txt
          fi

      - name: Extract native backtrace (macOS / lldb + crash report)
        if: always() && runner.os == 'macOS'
        run: |
          mkdir -p macos-crashlogs
          cp -f ~/Library/Logs/DiagnosticReports/*.ips macos-crashlogs/ 2>/dev/null || true
          cp -f ~/Library/Logs/DiagnosticReports/*.crash macos-crashlogs/ 2>/dev/null || true
          # The OS-symbolicated crash report has the full faulting-thread stack (incl. the caller of
          # strlen that the koffi trampoline hides from lldb). Print it inline so no download is needed.
          echo "===== newest macOS crash report (.ips) ====="
          shopt -s nullglob
          ips=( "$HOME"/Library/Logs/DiagnosticReports/*.ips )
          if [ ${#ips[@]} -gt 0 ]; then cat "${ips[-1]}" | tee -a backtrace.txt; else echo "(no .ips crash report found)"; fi
          cores=( /cores/core.* )
          core="${cores[0]:-}"
          if [ -n "$core" ]; then
            echo "core: $core"
            lldb --batch -c "$core" "$(command -v node)" \
              -o "thread backtrace all" -o "register read x0 x1 pc" \
              -o "memory read --format s \$x0" -o "image list" -o "quit" | tee -a backtrace.txt
            mkdir -p "$GITHUB_WORKSPACE/cores"
            gzip -c "$core" > "$GITHUB_WORKSPACE/cores/$(basename "$core").gz" || true
          else
            echo "no core in /cores (exit=${{ steps.repro.outputs.exit_code }}); rely on macos-crashlogs/*.ips for the symbolicated backtrace" | tee backtrace.txt
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ffi-segfault-${{ matrix.os }}-${{ matrix.mode }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            backtrace.txt
            test-output.log
            ffi-trace.log
            node-reports/
            macos-crashlogs/
            cores/
