name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # The postinstall binary download is not needed for unit tests / build; integration
  # tests self-skip when no rift binary is present. Keep CI hermetic and offline.
  RIFT_SKIP_BINARY_DOWNLOAD: '1'

jobs:
  test:
    name: test (node ${{ matrix.node }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  embedded-conformance:
    name: embedded conformance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # Workspace-relative so `actions/cache` can key on a plain path on every OS, rather than
      # depending on each platform's own cache-dir default (`~/.cache` / `%LOCALAPPDATA%`) resolving
      # predictably inside the runner.
      RIFT_CACHE_DIR: ${{ github.workspace }}/.rift-cache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Cache librift_ffi cdylib
        uses: actions/cache@v4
        with:
          path: ${{ env.RIFT_CACHE_DIR }}
          key: rift-ffi-${{ matrix.os }}-${{ hashFiles('package.json') }}

      # Best-effort: no `sdk-conformance-<version>` corpus or published cdylib release exists yet
      # (rift#460 / this issue's prerequisite), so this 404s today — `continue-on-error` lets the
      # job finish green with `RIFT_FFI_LIB` unset, at which point the embedded conformance lane
      # (test/conformance/replay.integration.test.ts's `describeEmbeddedOrSkip`) self-skips, same
      # as it does locally without koffi. Once the cdylib ships, this step starts succeeding and
      # the lane starts actually running, with no further CI change needed.
      - name: Fetch librift_ffi cdylib
        id: fetch-lib
        continue-on-error: true
        run: echo "lib_path=$(npx rift-fetch --lib)" >> "$GITHUB_OUTPUT"

      - name: Conformance + embedded integration tests
        run: npm test -- --testPathPattern="test/(conformance|integration)"
        env:
          RIFT_FFI_LIB: ${{ steps.fetch-lib.outputs.lib_path }}

  embedded-conformance-windows:
    # Experimental: Windows support for the embedded transport (koffi + the cdylib loader) is
    # unvalidated — this job tracks it without gating merges on it (`continue-on-error: true`), and
    # is named with the `experimental` label so it's obvious at a glance in the checks list.
    name: embedded conformance (windows-latest, experimental)
    runs-on: windows-latest
    continue-on-error: true
    env:
      RIFT_CACHE_DIR: ${{ github.workspace }}/.rift-cache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Cache librift_ffi cdylib
        uses: actions/cache@v4
        with:
          path: ${{ env.RIFT_CACHE_DIR }}
          key: rift-ffi-windows-latest-${{ hashFiles('package.json') }}

      # Same best-effort/self-skip reasoning as the ubuntu/macos job above; `shell: bash` so the
      # `$(...)`/`>>` output-capture syntax is portable to the Windows runner.
      - name: Fetch librift_ffi cdylib
        id: fetch-lib
        continue-on-error: true
        shell: bash
        run: echo "lib_path=$(npx rift-fetch --lib)" >> "$GITHUB_OUTPUT"

      - name: Conformance + embedded integration tests
        shell: bash
        run: npm test -- --testPathPattern="test/(conformance|integration)"
        env:
          RIFT_FFI_LIB: ${{ steps.fetch-lib.outputs.lib_path }}
